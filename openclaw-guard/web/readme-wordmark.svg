<svg width="900" height="120" viewBox="0 0 900 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw Guard / 虾护卫</title>
  <desc id="desc">OpenClaw Guard bilingual wordmark for README branding.</desc>
  <defs>
    <linearGradient id="openclawGradient" x1="8" y1="26" x2="388" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B2035" />
      <stop offset="0.52" stop-color="#1B456C" />
      <stop offset="1" stop-color="#2B5E87" />
    </linearGradient>
    <linearGradient id="guardGradient" x1="420" y1="28" x2="684" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0873BA" />
      <stop offset="0.5" stop-color="#18AFFF" />
      <stop offset="1" stop-color="#0D8FE0" />
    </linearGradient>
    <filter id="brandShadow" x="0" y="12" width="720" height="100" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="2" />
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.03  0 0 0 0 0.12  0 0 0 0 0.2  0 0 0 0.18 0" result="shadow" />
      <feBlend in="SourceGraphic" in2="shadow" mode="normal" />
    </filter>
  </defs>
  <g>
    <text x="8" y="78" fill="url(#openclawGradient)" filter="url(#brandShadow)" font-family="Bahnschrift, 'Segoe UI', Arial, sans-serif" font-size="62" font-weight="700" letter-spacing="2.5">OPENCLAW</text>
    <text x="420" y="78" fill="url(#guardGradient)" filter="url(#brandShadow)" stroke="#D6F4FF" stroke-width="0.9" paint-order="stroke" font-family="Bahnschrift, 'Segoe UI', Arial, sans-serif" font-size="62" font-weight="700" letter-spacing="2.5">GUARD</text>
    <text x="680" y="78" fill="#4B86AD" font-family="'Segoe UI', 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="0.6">/ 虾护卫</text>
  </g>
</svg>
